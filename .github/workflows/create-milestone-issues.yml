name: Crear Issues de Hitos

on:
  workflow_dispatch:

jobs:
  create-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Crear issues de los hitos
        uses: actions/github-script@v7
        with:
          script: |
            const milestoneIssues = [
              // ── Hito 1: Selección de Dominio y Modelado de Datos (9 de Marzo) ──
              {
                title: "Dominio y preguntas",
                body: "Especificar el área de aplicación y los tipos de\npreguntas que el sistema abordará.",
                labels: ["hito-1"],
              },
              {
                title: "Fuentes de ingesta",
                body: "Explicitar de dónde se obtendrán los textos (APIs,\nweb scraping, datasets públicos).",
                labels: ["hito-1"],
              },
              {
                title: "Modelo de datos Neo4j",
                body: "Diseñar un esquema detallando etiquetas (Labels), relaciones y propiedades de cada una. Se debe explicar razonadamente cómo este modelo se deriva de los textos de ingesta y cómo soporta las preguntas planteadas.",
                labels: ["hito-1"],
              },
              // ── Hito 2: Construcción Automática del Grafo de Conocimiento (13 de Abril) ──
              {
                title: "Entity Resolution",
                body: "Aplicar técnicas para evitar duplicidades (ej. unificar \"Velázquez\" y \"Diego de Silva y Velázquez\" como un mismo nodo).",
                labels: ["hito-2"],
              },
              {
                title: "Extracción Multi-paso",
                body: "Implementar estrategias de procesamiento iterativo. Dado que los LLMs a menudo omiten entidades en una sola pasada, se valorarán técnicas para aumentar el recall de entidades y relaciones.",
                labels: ["hito-2"],
              },
              {
                title: "Estrategias de Chunking",
                body: "Aplicar una fragmentación del texto que sea coherente con el caso de uso (basada en párrafos, secciones, semántica...).",
                labels: ["hito-2"],
              },
              {
                title: "Preprocesamiento para RAG",
                body: "Si se opta por Hypothetical Question Strategies u otras técnicas avanzadas que requieran preprocesamiento en tiempo de construcción del grafo, en este paso se deben generar las estructuras necesarias para dar soporte a la técnica (por ejemplo, en preguntas hipotéticas, aquí habría que computar los embeddings y las estructuras de preguntas a las que responde cada chunk de texto).",
                labels: ["hito-2"],
              },
              // ── Hito 3: Implementación y Evaluación de Retrievers (27 de Abril) ──
              {
                title: "Retriever Text2Cypher",
                body: "Un motor que transforme lenguaje natural en queries de Cypher. El prompt debe incluir obligatoriamente: esquema del modelo de datos, instrucciones de formato, mapas terminológicos y few-shot examples.",
                labels: ["hito-3"],
              },
              {
                title: "Retriever RAG Vectorial",
                body: "Implementación de técnicas de recuperación semántica, justificando las mejoras seleccionadas (ej. Reranking, Hybrid Searches, etc).",
                labels: ["hito-3"],
              },
              {
                title: "Retriever de Queries Manuales",
                body: "Implementación de consultas Cypher manuales para aquellas preguntas que sean complejas pero recurrentes en el dominio.",
                labels: ["hito-3"],
              },
              // ── Hito 4: Orquestación Agéntica y Evaluación Final (13 de Mayo) ──
              {
                title: "Sistema Agéntico",
                body: "El sistema recibirá una query en lenguaje natural y utilizará un Router para decidir qué retriever (o combinación de ellos) es el más adecuado.",
                labels: ["hito-4"],
              },
              {
                title: "Descomposición de Consultas",
                body: "El agente debe ser capaz de descomponer preguntas complejas en acciones atómicas ejecutables.",
                labels: ["hito-4"],
              },
              {
                title: "Agente Crítico",
                body: "Implementar un agente encargado de evaluar si la respuesta generada resuelve la intención original del usuario.",
                labels: ["hito-4"],
              },
              {
                title: "Evaluación Estructurada",
                body: "Realizar una evaluación final empleando métricas y estrategias de clase (o propias, con una justificación asociada).",
                labels: ["hito-4"],
              },
            ];

            // Obtener issues existentes para evitar duplicados
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "all",
              per_page: 100,
            });
            const existingTitles = new Set(existing.map((i) => i.title.trim()));

            // Asegurar que existen las etiquetas de hito
            const hitoLabels = [
              { name: "hito-1", color: "0075ca", description: "Hito 1: Selección de Dominio y Modelado de Datos (9 Mar)" },
              { name: "hito-2", color: "e4e669", description: "Hito 2: Construcción Automática del Grafo de Conocimiento (13 Abr)" },
              { name: "hito-3", color: "d93f0b", description: "Hito 3: Implementación y Evaluación de Retrievers (27 Abr)" },
              { name: "hito-4", color: "0e8a16", description: "Hito 4: Orquestación Agéntica y Evaluación Final (13 May)" },
            ];

            for (const label of hitoLabels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ...label,
                });
                console.log(`Etiqueta creada: ${label.name}`);
              } catch (e) {
                if (e.status === 422) {
                  console.log(`Etiqueta ya existe: ${label.name}`);
                } else {
                  throw e;
                }
              }
            }

            // Crear los issues que no existan
            let created = 0;
            let skipped = 0;
            for (const issue of milestoneIssues) {
              if (existingTitles.has(issue.title.trim())) {
                console.log(`Issue ya existe, omitiendo: "${issue.title}"`);
                skipped++;
                continue;
              }
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issue.title,
                body: issue.body,
                labels: issue.labels,
              });
              console.log(`Issue creado: "${issue.title}"`);
              created++;
            }
            console.log(`\nResumen: ${created} issues creados, ${skipped} omitidos (ya existían).`);
